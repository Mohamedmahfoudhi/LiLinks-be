version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pointpay-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: pointpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pointpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: pointpay-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pointpay
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_POOL_SIZE: 20
      QR_SECRET: super_secret_hmac_key_change_in_production_abc123
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
